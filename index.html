<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brandle | Discover Rare Tech</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="logo">Brandle</div>

<nav>
<a href="#">Home</a>
<a href="#">Gadgets</a>
<a href="#">Deals</a>
<a href="#">Reviews</a>
<a href="#">About</a>

<div class="toggle-container">
<label class="switch">
<input type="checkbox" id="modeToggle">
<span class="slider"></span>
</label>
</div>

</nav>

</header>


<section class="hero">

<div class="hero-content">

<h1>Discover the Best Tech Products</h1>

<p>Search gadgets, compare prices and buy instantly from Amazon.</p>

<div class="search-box">

<input id="searchInput" placeholder="Search gadgets...">

<button onclick="searchProduct()">Search</button>

</div>

</div>

</section>

<section class="categories">

<h2>Browse by Category</h2>

<div class="category-grid">

<div class="cat" onclick="openCategory('cool')">Cool Gadgets</div>

<div class="cat" onclick="openCategory('toys')">Tech Toys</div>

<div class="cat" onclick="openCategory('500')">Under ₹500</div>

<div class="cat" onclick="openCategory('1000')">Under ₹1000</div>

<div class="cat" onclick="openCategory('trending')">Trending Tech</div>

</section>

<section class="random-gadget">

<h2>🎲 Find Me Something Cool</h2>

<button onclick="randomGadget()" class="cool-btn">
Discover Random Gadget
</button>

</section>

<footer>

<p>© 2026 Brandle. All rights reserved.</p>

</footer>

<script src="script.js"></script>

</body>

</html>
